<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yonnovate — Coming Soon</title>
  <meta name="description" content="Yonnovate — Building what’s next." />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --link: rgba(255,255,255,0.88);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow: hidden;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.05), transparent 34%),
        linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.78)),
        url("https://drive.google.com/uc?export=view&id=1t1KL4fx7_HcBiNLAsSnUlD5ohhifBXP6") center center / cover no-repeat;
      transform: scale(1.03);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(720px, 88vw);
      height: auto;
      margin: 0 auto 42px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.06em;
      text-wrap: balance;
    }

    .soon {
      margin: 18px 0 0;
      font-size: clamp(1rem, 1.6vw, 1.15rem);
      line-height: 1.4;
      color: var(--muted);
      font-weight: 500;
    }

    .contact {
      display: inline-block;
      margin-top: 42px;
      color: var(--link);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.28);
      padding-bottom: 4px;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .contact:hover {
      opacity: 0.85;
      border-color: rgba(255,255,255,0.72);
    }

    @media (max-width: 640px) {
      .logo {
        width: min(560px, 92vw);
        margin-bottom: 30px;
      }

      .soon {
        margin-top: 14px;
      }

      .contact {
        margin-top: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="wrap">
    <img
      class="logo"
      src="logo1"
      alt="Yonnovate logo"
    />

    <h1>Building what’s next</h1>
    <p class="soon">Launching soon</p>

    <a class="contact" href="mailto:y@yonnovate.com">Contact</a>
  </main>
</body>
</html>
