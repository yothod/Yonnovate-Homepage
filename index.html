<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yonnovate — Coming Soon</title>

  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: var(--text);
      font-family: Inter, -apple-system, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 60px;
    }

    /* LOGO */
    .logo {
      width: 130px;
    }

    /* HERO */
    .hero {
      margin-top: 80px;
    }

    h1 {
      font-size: clamp(3rem, 6vw, 6rem);
      line-height: 1;
      margin: 0;
      letter-spacing: -0.04em;
      font-weight: 700;

      /* KEY FIXES */
      text-transform: uppercase;
      white-space: nowrap;
    }

    .soon {
      margin-top: 18px;
      font-size: 1.05rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* CONTACT */
    .footer {
      display: flex;
      justify-content: flex-end;
    }

    .contact {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 3px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .contact:hover {
      border-color: rgba(255,255,255,0.7);
    }

    /* MOBILE */
    @media (max-width: 768px) {

      body {
        padding: 24px;
      }

      .logo {
        width: 200px;
        margin: 0 auto;
      }

      .hero {
        margin-top: 40px;
        text-align: center;
      }

      h1 {
        white-space: normal; /* allow wrap on mobile */
      }

      .footer {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <img class="logo" src="logo1" alt="Yonnovate logo" />

  <!-- HERO -->
  <div class="hero">
    <h1>Building what’s next</h1>
    <div class="soon">Launching soon</div>
  </div>

  <!-- CONTACT -->
  <div class="footer">
    <a class="contact" href="mailto:y@yonnovate.com">Contact</a>
  </div>

</body>
</html>
